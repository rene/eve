name: PR Approval Gate
on:
  pull_request_review:
    types: [submitted]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    if: ${{ github.event.review.state == 'approved' }}
    runs-on: ubuntu-latest
    outputs:
      only_md:                 ${{ steps.detect.outputs.only_md }}
      workflow_files_modified: ${{ steps.detect.outputs.workflow_files_modified }}
      run_id:                  ${{ steps.lookup.outputs.run_id }}

    steps:
      - name: Detect file changes
        id: detect
        env:
          PR_FILES_URL: ${{ github.event.pull_request._links.self.href }}/files
        run: |
          RESPONSE=$(curl -s "$PR_FILES_URL")
          MODIFIED=$(echo "$RESPONSE" | jq -r '.[].filename')

          ONLY_MD=true
          echo "$MODIFIED" | grep -vq '\.md$' && ONLY_MD=false
          echo "only_md=$ONLY_MD" >> $GITHUB_OUTPUT

          WF_MOD=false
          echo "$MODIFIED" | grep -qE '^\.github/workflows/.*\.(yml|yaml)$' && WF_MOD=true
          echo "workflow_files_modified=$WF_MOD" >> $GITHUB_OUTPUT

      - name: Lookup build run id
        id: lookup
        if: ${{ steps.detect.outputs.only_md == 'false' && steps.detect.outputs.workflow_files_modified == 'false' }}
        env:
          SHA:  ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          url="https://api.github.com/repos/$REPO/actions/workflows/build.yml/runs?head_sha=$SHA&status=success"
          RUN_ID=$(curl -s "$url" | jq -r '.workflow_runs[0].id')
          MAX_BUILDING_TIME=7200  # Maximum time to wait for a successful build in seconds (1 hour)
          while [ "$RUN_ID" == "null" ] && [ $MAX_BUILDING_TIME -gt 0 ]; do
            echo "No successful build run found for SHA $SHA in repository $REPO. Retrying in 5 minutes..."
            sleep 300  # Wait for 5 minutes before retrying
            MAX_BUILDING_TIME=$((MAX_BUILDING_TIME - 300))  # Decrease the remaining time
            RUN_ID=$(curl -s "$url" | jq -r '.workflow_runs[0].id')
          done
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      - name: Upload gate-context artifact
        if: ${{ always() }}
        run: |
          cat > gate-context.json <<EOF
          {
            "pr":  "${{ github.event.pull_request.number }}",
            "run": "${{ steps.lookup.outputs.run_id }}"
          }
          EOF
      - uses: actions/upload-artifact@v4
        with:
          name: gate-context
          path: gate-context.json
