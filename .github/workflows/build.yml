---
name: PR build
on:  # yamllint disable-line rule:truthy
  pull_request:
    branches:
      - "master"
      - "[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+-stable"
      - "feature/*"
    paths-ignore:
      - '.github/**'
      - '**/*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ════════════════════════════════════════════════════════════════════════
  # Stage 1: packages that feed multiple eve targets
  # These upload linuxkit cache as artifacts for the fan-out eve jobs.
  # ════════════════════════════════════════════════════════════════════════

  pkgs-amd64-generic:
    runs-on: jumbo
    timeout-minutes: 1440
    steps:
      - name: Starting Report
        run: |
          echo Git Ref: ${{ github.event.pull_request.head.ref }}
          echo GitHub Event: ${{ github.event_name }}
          echo "Build target: pkgs amd64 generic"
          echo Disk usage
          df -h
          echo Memory
          free -m
      - name: Clear repository
        run: |
          sudo rm -fr "$GITHUB_WORKSPACE" && mkdir "$GITHUB_WORKSPACE"
          rm -fr ~/.linuxkit
          docker system prune --all --force --volumes
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          username: ${{ secrets.MIKEM_DOCKERHUB_ACCOUNT }}
          password: ${{ secrets.MIKEM_DOCKERHUB_TOKEN }}
      - name: Build packages
        run: |
          make V=1 PRUNE=1 PLATFORM=generic ZARCH=amd64 pkgs
      - name: Upload linuxkit cache
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: linuxkit-cache-amd64-generic
          path: ~/.linuxkit/cache
          retention-days: 1
      - name: Post package report
        run: |
          echo Disk usage
          df -h
          echo Memory
          free -m
          docker system df
          docker system df -v

  pkgs-arm64-generic:
    runs-on: zededa-ubuntu-2204-arm64
    timeout-minutes: 1440
    steps:
      - name: Starting Report
        run: |
          echo Git Ref: ${{ github.event.pull_request.head.ref }}
          echo GitHub Event: ${{ github.event_name }}
          echo "Build target: pkgs arm64 generic"
          echo Disk usage
          df -h
          echo Memory
          free -m
      - name: Clear repository
        run: |
          sudo rm -fr "$GITHUB_WORKSPACE" && mkdir "$GITHUB_WORKSPACE"
          rm -fr ~/.linuxkit
          docker system prune --all --force --volumes
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          username: ${{ secrets.MIKEM_DOCKERHUB_ACCOUNT }}
          password: ${{ secrets.MIKEM_DOCKERHUB_TOKEN }}
      - name: Build packages
        run: |
          make V=1 PRUNE=1 PLATFORM=generic ZARCH=arm64 pkgs
      - name: Upload linuxkit cache
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: linuxkit-cache-arm64-generic
          path: ~/.linuxkit/cache
          retention-days: 1
      - name: Post package report
        run: |
          echo Disk usage
          df -h
          echo Memory
          free -m
          docker system df
          docker system df -v

  # ════════════════════════════════════════════════════════════════════════
  # Stage 2: eve targets that fan out from shared package builds
  # ════════════════════════════════════════════════════════════════════════

  eve-amd64-generic:
    needs: pkgs-amd64-generic
    strategy:
      fail-fast: false
      matrix:
        include:
          - hv: xen
            platform: generic
          - hv: kvm
            platform: generic
          - hv: kvm
            platform: rt
    runs-on: jumbo
    timeout-minutes: 1440
    steps:
      - name: Clear repository
        run: |
          sudo rm -fr "$GITHUB_WORKSPACE" && mkdir "$GITHUB_WORKSPACE"
          rm -fr ~/.linuxkit
          docker system prune --all --force --volumes
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          username: ${{ secrets.MIKEM_DOCKERHUB_ACCOUNT }}
          password: ${{ secrets.MIKEM_DOCKERHUB_TOKEN }}
      - name: Download linuxkit cache
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: linuxkit-cache-amd64-generic
          path: ~/.linuxkit/cache
      - name: Load tool images into docker
        run: |
          make cache-export-docker-load-all
      - name: Set environment
        env:
          PR_ID: ${{ github.event.pull_request.number }}
        run: |
          COMMIT_ID=$(git describe --abbrev=8 --always)
          echo "VERSION=0.0.0-pr$PR_ID-$COMMIT_ID" >> $GITHUB_ENV
          echo "TAG=evebuild/pr:$PR_ID" >> $GITHUB_ENV
          echo "ARCH=amd64" >> "$GITHUB_ENV"
      - name: Build EVE ${{ matrix.hv }}-amd64-${{ matrix.platform }}
        run: |
          make V=1 ROOTFS_VERSION="$VERSION" PLATFORM=${{ matrix.platform }} HV=${{ matrix.hv }} ZARCH=amd64 eve
      - name: Post eve build report
        run: |
          echo Disk usage
          df -h
          echo Memory
          free -m
          docker system df
          docker system df -v
      - name: Export docker container
        run: |
          make cache-export ZARCH=amd64 IMAGE=lfedge/eve:$VERSION-${{ matrix.hv }} OUTFILE=eve-${{ matrix.hv }}-amd64-${{ matrix.platform }}.tar IMAGE_NAME=$TAG-${{ matrix.hv }}-amd64
      - name: Upload EVE ${{ matrix.hv }}-amd64-${{ matrix.platform }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: eve-${{ matrix.hv }}-amd64-${{ matrix.platform }}
          path: eve-${{ matrix.hv }}-amd64-${{ matrix.platform }}.tar
      - name: Clean
        if: ${{ always() }}
        run: |
          make clean
          docker system prune -f -a --volumes
          rm -rf ~/.linuxkit

  eve-arm64-generic:
    needs: pkgs-arm64-generic
    strategy:
      fail-fast: false
      matrix:
        hv: [xen, kvm]
    runs-on: zededa-ubuntu-2204-arm64
    timeout-minutes: 1440
    steps:
      - name: Clear repository
        run: |
          sudo rm -fr "$GITHUB_WORKSPACE" && mkdir "$GITHUB_WORKSPACE"
          rm -fr ~/.linuxkit
          docker system prune --all --force --volumes
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          username: ${{ secrets.MIKEM_DOCKERHUB_ACCOUNT }}
          password: ${{ secrets.MIKEM_DOCKERHUB_TOKEN }}
      - name: Download linuxkit cache
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: linuxkit-cache-arm64-generic
          path: ~/.linuxkit/cache
      - name: Load tool images into docker
        run: |
          make cache-export-docker-load-all
      - name: Set environment
        env:
          PR_ID: ${{ github.event.pull_request.number }}
        run: |
          COMMIT_ID=$(git describe --abbrev=8 --always)
          echo "VERSION=0.0.0-pr$PR_ID-$COMMIT_ID" >> $GITHUB_ENV
          echo "TAG=evebuild/pr:$PR_ID" >> $GITHUB_ENV
          echo "ARCH=arm64" >> "$GITHUB_ENV"
      - name: Build EVE ${{ matrix.hv }}-arm64-generic
        run: |
          make V=1 ROOTFS_VERSION="$VERSION" PLATFORM=generic HV=${{ matrix.hv }} ZARCH=arm64 eve
      - name: Post eve build report
        run: |
          echo Disk usage
          df -h
          echo Memory
          free -m
          docker system df
          docker system df -v
      - name: Export docker container
        run: |
          make cache-export ZARCH=arm64 IMAGE=lfedge/eve:$VERSION-${{ matrix.hv }} OUTFILE=eve-${{ matrix.hv }}-arm64-generic.tar IMAGE_NAME=$TAG-${{ matrix.hv }}-arm64
      - name: Upload EVE ${{ matrix.hv }}-arm64-generic
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: eve-${{ matrix.hv }}-arm64-generic
          path: eve-${{ matrix.hv }}-arm64-generic.tar
      - name: Clean
        if: ${{ always() }}
        run: |
          make clean
          docker system prune -f -a --volumes
          rm -rf ~/.linuxkit

  # ════════════════════════════════════════════════════════════════════════
  # Stage 2: riscv64 cross-build (needs amd64 tools from pkgs-amd64-generic)
  # ════════════════════════════════════════════════════════════════════════

  build-riscv64:
    needs: pkgs-amd64-generic
    runs-on: jumbo
    timeout-minutes: 1440
    steps:
      - name: Starting Report
        run: |
          echo Git Ref: ${{ github.event.pull_request.head.ref }}
          echo GitHub Event: ${{ github.event_name }}
          echo "Build target: mini-riscv64-generic (cross-build)"
          echo Disk usage
          df -h
          echo Memory
          free -m
      - name: Clear repository
        run: |
          sudo rm -fr "$GITHUB_WORKSPACE" && mkdir "$GITHUB_WORKSPACE"
          rm -fr ~/.linuxkit
          docker system prune --all --force --volumes
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2  # v4.0.0
        with:
          username: ${{ secrets.MIKEM_DOCKERHUB_ACCOUNT }}
          password: ${{ secrets.MIKEM_DOCKERHUB_TOKEN }}
      - name: Ensure packages for cross-arch build
        run: |
          APT_INSTALL="sudo apt install -y binfmt-support qemu-user-static"
          $APT_INSTALL || { sudo apt update && $APT_INSTALL ; }
      # Restore amd64 tool images, load into docker, then clear cache
      - name: Download amd64 linuxkit cache
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4.3.0
        with:
          name: linuxkit-cache-amd64-generic
          path: ~/.linuxkit/cache
      - name: Load amd64 tools into docker
        run: |
          make cache-export-docker-load-all
          rm -rf ~/.linuxkit
      # Build riscv64 packages
      - name: Build riscv64 packages
        run: |
          make V=1 PRUNE=1 PLATFORM=generic ZARCH=riscv64 pkgs
      # Build eve
      - name: Set environment
        env:
          PR_ID: ${{ github.event.pull_request.number }}
        run: |
          COMMIT_ID=$(git describe --abbrev=8 --always)
          echo "VERSION=0.0.0-pr$PR_ID-$COMMIT_ID" >> $GITHUB_ENV
          echo "TAG=evebuild/pr:$PR_ID" >> $GITHUB_ENV
          echo "ARCH=riscv64" >> "$GITHUB_ENV"
      - name: Build EVE mini-riscv64-generic
        run: |
          make V=1 ROOTFS_VERSION="$VERSION" PLATFORM=generic HV=mini ZARCH=riscv64 eve
      - name: Post eve build report
        run: |
          echo Disk usage
          df -h
          echo Memory
          free -m
          docker system df
          docker system df -v
      - name: Export docker container
        run: |
          make cache-export ZARCH=riscv64 IMAGE=lfedge/eve:$VERSION-mini OUTFILE=eve-mini-riscv64-generic.tar IMAGE_NAME=$TAG-mini-riscv64
      - name: Upload EVE mini-riscv64-generic
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: eve-mini-riscv64-generic
          path: eve-mini-riscv64-generic.tar
      - name: Clean
        if: ${{ always() }}
        run: |
          make clean
          docker system prune -f -a --volumes
          rm -rf ~/.linuxkit

  # ════════════════════════════════════════════════════════════════════════
  # Standalone: single-target builds (pkgs + eve in one job, no deps)
  # ════════════════════════════════════════════════════════════════════════

