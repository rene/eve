      - name: Export docker container
        run: |
          make cache-export ZARCH=amd64 IMAGE=lfedge/eve:$VERSION-k OUTFILE=eve-k-amd64-generic.tar IMAGE_NAME=$TAG-k-amd64
      - name: Upload EVE k-amd64-generic
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: eve-k-amd64-generic
          path: eve-k-amd64-generic.tar
      - name: Clean
        if: ${{ always() }}
        run: |
          make clean
          docker system prune -f -a --volumes
          rm -rf ~/.linuxkit
