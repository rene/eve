        run: |
          COMMIT_ID=$(git describe --abbrev=8 --always)
          echo "VERSION=0.0.0-pr$PR_ID-$COMMIT_ID" >> $GITHUB_ENV
          echo "TAG=evebuild/pr:$PR_ID" >> $GITHUB_ENV
          echo "ARCH=arm64" >> "$GITHUB_ENV"
      - name: Build EVE kvm-arm64-nvidia-jp5
        run: |
          make V=1 ROOTFS_VERSION="$VERSION" PLATFORM=nvidia-jp5 HV=kvm ZARCH=arm64 eve
      - name: Post eve build report
        run: |
          echo Disk usage
          df -h
          echo Memory
          free -m
          docker system df
          docker system df -v
      - name: Export docker container
        run: |
          make cache-export ZARCH=arm64 IMAGE=lfedge/eve:$VERSION-kvm OUTFILE=eve-kvm-arm64-nvidia-jp5.tar IMAGE_NAME=$TAG-kvm-arm64
      - name: Upload EVE kvm-arm64-nvidia-jp5
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
        with:
          name: eve-kvm-arm64-nvidia-jp5
          path: eve-kvm-arm64-nvidia-jp5.tar
      - name: Clean
        if: ${{ always() }}
        run: |
          make clean
          docker system prune -f -a --volumes
          rm -rf ~/.linuxkit

  build-arm64-nvidia-jp6:
