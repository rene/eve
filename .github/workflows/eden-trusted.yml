name: PR Approval Runner   # secrets-enabled stage

on:
  workflow_run:
    workflows: ["PR Approval Gate"]
    types: [completed]

permissions:
  contents: read
  actions:  read
  checks:   write

env:
  CHECK_NAME: Eden trusted tests
  DETAILS_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

jobs:
  context:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    outputs:
      pr:       ${{ steps.parse.outputs.pr }}
      run_id:   ${{ steps.parse.outputs.run_id }}
      check_id: ${{ steps.open.outputs.id }}
    steps:
      # download gate-context artifact (PR number + build run-id)
      - name: Download gate-context
        uses: actions/download-artifact@v4
        with:
          name: gate-context
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - id: parse
        run: |
          echo "pr=$(jq -r .pr  gate-context.json)"      >> $GITHUB_OUTPUT
          echo "run_id=$(jq -r .run gate-context.json)"  >> $GITHUB_OUTPUT

      # create an “in-progress” check-run on the PR HEAD commit
      - id: open
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { owner, repo } = context.repo;
            const head_sha = context.payload.workflow_run.pull_requests[0].head.sha;
            const { data } = await github.rest.checks.create({
              owner, repo,
              name: process.env.CHECK_NAME,
              head_sha,
              status:     'in_progress',
              started_at: new Date().toISOString(),
              details_url: process.env.DETAILS_URL,
              output: {
                title:   'Runner workflow started',
                summary: 'Executing Eden trusted tests …'
              }
            });
            core.setOutput('id', data.id.toString());

  tests:
    needs: context
    uses: lf-edge/eden/.github/workflows/test.yml@1.0.2
    secrets: inherit
    strategy:
      fail-fast: false
      matrix:
        arch:     [amd64]
        hv:       [kvm]
        platform: ["generic"]
    with:
      eve_image:         "evebuild/pr:${{ needs.context.outputs.pr }}"
      eve_log_level:     "debug"
      eve_artifact_name: "eve-${{ matrix.hv }}-${{ matrix.arch }}-${{ matrix.platform }}"
      artifact_run_id:   ${{ needs.context.outputs.run_id }}
      eden_version:      "1.0.2"

  close_check:
    if: always()
    needs: [context, tests]
    runs-on: ubuntu-latest
    steps:
      - name: Finalise PR check-run
        uses: actions/github-script@v7
        env:
          CHECK_ID: ${{ needs.context.outputs.check_id }}
          RESULT:   ${{ needs.tests.result }}         # success / failure / cancelled
          DETAILS:  ${{ env.DETAILS_URL }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const id  = Number(process.env.CHECK_ID);
            const map = { success:'success', failure:'failure', cancelled:'cancelled' };
            const conclusion = map[process.env.RESULT] || 'neutral';
            await github.rest.checks.update({
              owner, repo, check_run_id: id,
              status: 'completed',
              completed_at: new Date().toISOString(),
              conclusion,
              details_url: process.env.DETAILS,
              output: {
                title:   'Eden trusted tests',
                summary: `Workflow **${conclusion}** – click *Details* for full job list.`
              }
            });
